name: Factory Runner

'on':
  workflow_dispatch:
    inputs:
      work_unit_id:
        description: Approved orchestrator work-unit ID
        required: true
        type: string
      orchestrator_url:
        description: Orchestrator API URL
        required: false
        default: https://sds.alobar.net
        type: string
  workflow_call:
    inputs:
      work_unit_id:
        required: true
        type: string
      orchestrator_url:
        required: false
        default: https://sds.alobar.net
        type: string
    secrets:
      FACTORY_RUNNER_TOKEN:
        required: true
      FACTORY_RUNNER_CREDENTIAL_KEY_ID:
        required: true
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ORCHESTRATOR_URL: ${{ inputs.orchestrator_url }}
      WORK_UNIT_ID: ${{ inputs.work_unit_id }}
      CURRENT_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: astral-sh/setup-uv@v5

      - name: Install factory runner
        run: uv tool install git+https://github.com/AlobarQuest/factory-runner.git

      - name: Prepare scoped run
        id: prepare
        env:
          FACTORY_RUNNER_TOKEN: ${{ secrets.FACTORY_RUNNER_TOKEN }}
          FACTORY_RUNNER_CREDENTIAL_KEY_ID: ${{ secrets.FACTORY_RUNNER_CREDENTIAL_KEY_ID }}
        run: |
          factory-runner prepare-run \
            --orchestrator-url "$ORCHESTRATOR_URL" \
            --credential-key-id "$FACTORY_RUNNER_CREDENTIAL_KEY_ID" \
            --work-unit-id "$WORK_UNIT_ID" \
            --current-repository "$CURRENT_REPOSITORY" \
            --workspace-dir "$RUNNER_TEMP/factory-runner"

      # The action declares no `model` input; it reads ANTHROPIC_MODEL from the env.
      # Its built-in default is a retired model, so an unset value fails every run with
      # `API Error: 404 not_found_error`.
      - name: Run scoped coding action
        uses: anthropics/claude-code-base-action@beta
        env:
          ANTHROPIC_MODEL: claude-sonnet-5
        with:
          prompt_file: ${{ steps.prepare.outputs.prompt_file }}
          allowed_tools: ${{ steps.prepare.outputs.allowed_tools }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: "10"

      # Only meaningful once prepare has claimed the unit. Without this guard an
      # earlier failure runs finalize against an unclaimed unit, burying the real
      # error under a second one.
      - name: Finalize scoped run
        if: always() && steps.prepare.outcome != 'skipped'
        env:
          FACTORY_RUNNER_TOKEN: ${{ secrets.FACTORY_RUNNER_TOKEN }}
          FACTORY_RUNNER_CREDENTIAL_KEY_ID: ${{ secrets.FACTORY_RUNNER_CREDENTIAL_KEY_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          factory-runner finalize-run \
            --orchestrator-url "$ORCHESTRATOR_URL" \
            --credential-key-id "$FACTORY_RUNNER_CREDENTIAL_KEY_ID" \
            --work-unit-id "$WORK_UNIT_ID" \
            --workspace-dir "$RUNNER_TEMP/factory-runner"
